name: Daily Geomag Paper Summary

# 💡 いつ、どのような条件で実行するかを設定
on:
  schedule:
    # 毎日日本時間の朝7:00（UTC/世界標準時の時間軸では前日の22:00）に定期実行
    - cron: '0 22 * * *'
  workflow_dispatch: # GitHubの画面から手動で「今すぐ実行」ボタンを押せるようにする設定

jobs:
  run-bot:
    runs-on: ubuntu-latest # クラウド上のLinux（Ubuntu）環境をレンタルして実行

    steps:
    # 1. GitHub上にアップロードしたあなたのコード一式を、クラウド環境にコピー（展開）
    - name: Checkout repository code
      uses: actions/checkout@v5

    # 2. クラウド環境にPythonをセットアップ
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 3. requirements.txtを読み込み、必要なライブラリ（google-genai, feedparser等）をインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. summary_geomag.py を実行（GitHub Secretsからキーを安全に流し込む）
    - name: Run summary script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python summary_geomag.py